<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة رفع الصور - MalaebBooking</title>
    <!-- Tailwind CSS للتصميم السريع -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel لتحويل كود JSX في المتصفح المباشر -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // إعدادات الـ API
            const [baseUrl, setBaseUrl] = useState('https://localhost:7087'); // غير ده للبورت بتاعك
            const [token, setToken] = useState(''); // لو الاندبوينت محتاجة Authorization

            // حالات الـ Stadium
            const [stadiumId, setStadiumId] = useState('1');
            const [stadiumFile, setStadiumFile] = useState(null);
            const [stadiumImages, setStadiumImages] = useState([]);
            const [isPrimary, setIsPrimary] = useState(false);
            const [displayOrder, setDisplayOrder] = useState('0');
            const [stadiumLoading, setStadiumLoading] = useState(false);

            // حالات الـ Sport Type
            const [sportTypeId, setSportTypeId] = useState('1');
            const [sportTypeFile, setSportTypeFile] = useState(null);
            const [sportTypeIcon, setSportTypeIcon] = useState(null);
            const [sportTypeLoading, setSportTypeLoading] = useState(false);

            const [message, setMessage] = useState('');

            // ==========================================
            // دوال الملاعب (Stadiums)
            // ==========================================
            const fetchStadiumImages = async () => {
                setStadiumLoading(true);
                try {
                    const res = await fetch(`${baseUrl}/api/stadiums/${stadiumId}/images`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setStadiumImages(data);
                    } else {
                        setStadiumImages([]);
                    }
                } catch (err) {
                    console.error("Error fetching stadium images", err);
                }
                setStadiumLoading(false);
            };

            const handleUploadStadiumImage = async (e) => {
                e.preventDefault();
                if (!stadiumFile) return alert("اختر صورة أولاً");
                
                setStadiumLoading(true);
                const formData = new FormData();
                formData.append('File', stadiumFile);
                formData.append('IsPrimary', isPrimary);
                formData.append('DisplayOrder', displayOrder);

                try {
                    const res = await fetch(`${baseUrl}/api/stadiums/${stadiumId}/images`, {
                        method: 'POST',
                        body: formData,
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        setMessage('✅ تم رفع صورة الملعب بنجاح!');
                        fetchStadiumImages();
                        setStadiumFile(null);
                    } else {
                        const err = await res.json();
                        setMessage(`❌ خطأ: ${err.Description || err.title || 'حدث خطأ'}`);
                    }
                } catch (err) {
                    setMessage(`❌ خطأ في الاتصال بالسيرفر`);
                }
                setStadiumLoading(false);
            };

            const handleDeleteStadiumImage = async (imageId) => {
                if(!confirm("متأكد من حذف الصورة؟")) return;
                setStadiumLoading(true);
                try {
                    const res = await fetch(`${baseUrl}/api/stadiums/${stadiumId}/images/${imageId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        setMessage('🗑️ تم حذف الصورة بنجاح');
                        fetchStadiumImages();
                    }
                } catch (err) {
                    setMessage(`❌ خطأ في الحذف`);
                }
                setStadiumLoading(false);
            };

            // ==========================================
            // دوال أنواع الرياضة (Sport Types)
            // ==========================================
            const fetchSportType = async () => {
                setSportTypeLoading(true);
                try {
                    const res = await fetch(`${baseUrl}/api/sporttypes/${sportTypeId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setSportTypeIcon(data.iconUrl);
                    } else {
                        setSportTypeIcon(null);
                    }
                } catch (err) {
                    console.error("Error fetching sport type", err);
                }
                setSportTypeLoading(false);
            };

            const handleUploadSportTypeIcon = async (e) => {
                e.preventDefault();
                if (!sportTypeFile) return alert("اختر صورة أولاً");
                
                setSportTypeLoading(true);
                const formData = new FormData();
                formData.append('File', sportTypeFile);

                try {
                    const res = await fetch(`${baseUrl}/api/sporttypes/${sportTypeId}/icon`, {
                        method: 'POST',
                        body: formData,
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        setMessage('✅ تم رفع أيقونة الرياضة بنجاح!');
                        fetchSportType();
                        setSportTypeFile(null);
                    } else {
                        const err = await res.json();
                        setMessage(`❌ خطأ: ${err.Description || err.title || 'حدث خطأ'}`);
                    }
                } catch (err) {
                    setMessage(`❌ خطأ في الاتصال بالسيرفر`);
                }
                setSportTypeLoading(false);
            };

            return (
                <div className="container mx-auto p-4 max-w-5xl">
                    <h1 className="text-3xl font-bold text-center mb-8 text-blue-700">⚽ لوحة تجربة رفع الصور</h1>
                    
                    {/* إعدادات الاتصال */}
                    <div className="bg-white p-6 rounded-lg shadow-md mb-8 border-t-4 border-blue-500">
                        <h2 className="text-xl font-semibold mb-4"><i className="fas fa-cog"></i> إعدادات الـ API</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">الرابط الأساسي (Base URL)</label>
                                <input type="text" value={baseUrl} onChange={e => setBaseUrl(e.target.value)} className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" dir="ltr" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">التوكن (JWT Token) - <span className="text-red-500 text-xs">مطلوب لو الاندبوينت محمية</span></label>
                                <input type="text" value={token} onChange={e => setToken(e.target.value)} placeholder="ey......." className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" dir="ltr" />
                            </div>
                        </div>
                    </div>

                    {message && (
                        <div className="p-4 mb-8 bg-black text-white rounded-lg text-center font-bold animate-pulse">
                            {message}
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* قسم الملاعب */}
                        <div className="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                            <h2 className="text-2xl font-semibold mb-4"><i className="fas fa-futbol text-green-600"></i> صور الملاعب</h2>
                            
                            <div className="flex gap-2 mb-4">
                                <input type="number" value={stadiumId} onChange={e => setStadiumId(e.target.value)} placeholder="رقم الملعب (ID)" className="border p-2 rounded w-24" />
                                <button onClick={fetchStadiumImages} className="bg-green-100 text-green-700 px-4 py-2 rounded hover:bg-green-200 transition">
                                    {stadiumLoading ? <div className="loader"></div> : 'عرض الصور'}
                                </button>
                            </div>

                            <form onSubmit={handleUploadStadiumImage} className="bg-gray-50 p-4 rounded border mb-6">
                                <h3 className="font-bold mb-2">رفع صورة لملعب ({stadiumId})</h3>
                                <input type="file" accept="image/*" onChange={e => setStadiumFile(e.target.files[0])} className="w-full mb-3 p-2 bg-white border rounded" />
                                
                                <div className="flex gap-4 mb-3">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={isPrimary} onChange={e => setIsPrimary(e.target.checked)} className="w-4 h-4" />
                                        <span>صورة رئيسية؟</span>
                                    </label>
                                    <label className="flex items-center gap-2">
                                        <span>الترتيب:</span>
                                        <input type="number" value={displayOrder} onChange={e => setDisplayOrder(e.target.value)} className="border p-1 rounded w-16" />
                                    </label>
                                </div>
                                
                                <button type="submit" disabled={!stadiumFile || stadiumLoading} className="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700 disabled:bg-gray-400 flex justify-center">
                                    {stadiumLoading ? <div className="loader"></div> : 'رفع الصورة'}
                                </button>
                            </form>

                            <div className="grid grid-cols-2 gap-4">
                                {stadiumImages.length === 0 && <p className="text-gray-500 text-center col-span-2">لا يوجد صور حتى الآن.</p>}
                                {stadiumImages.map(img => (
                                    <div key={img.id} className="relative group rounded overflow-hidden shadow-sm border">
                                        <img src={`${baseUrl}${img.imageUrl}`} alt="Stadium" className="w-full h-32 object-cover" onError={(e)=>{e.target.src='https://via.placeholder.com/150?text=Error'}} />
                                        <div className="absolute top-0 right-0 bg-black bg-opacity-70 text-white text-xs px-2 py-1 m-1 rounded">
                                            {img.isPrimary ? '🌟 رئيسية' : `ترتيب: ${img.displayOrder}`}
                                        </div>
                                        <button onClick={() => handleDeleteStadiumImage(img.id)} className="absolute bottom-1 right-1 bg-red-600 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition shadow hover:bg-red-700">
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* قسم الرياضات */}
                        <div className="bg-white p-6 rounded-lg shadow-md border-t-4 border-orange-500">
                            <h2 className="text-2xl font-semibold mb-4"><i className="fas fa-table-tennis text-orange-600"></i> أيقونات الرياضة</h2>
                            
                            <div className="flex gap-2 mb-4">
                                <input type="number" value={sportTypeId} onChange={e => setSportTypeId(e.target.value)} placeholder="رقم الرياضة (ID)" className="border p-2 rounded w-24" />
                                <button onClick={fetchSportType} className="bg-orange-100 text-orange-700 px-4 py-2 rounded hover:bg-orange-200 transition">
                                    {sportTypeLoading ? <div className="loader"></div> : 'عرض الأيقونة'}
                                </button>
                            </div>

                            <form onSubmit={handleUploadSportTypeIcon} className="bg-gray-50 p-4 rounded border mb-6">
                                <h3 className="font-bold mb-2">رفع أيقونة لرياضة ({sportTypeId})</h3>
                                <input type="file" accept="image/*" onChange={e => setSportTypeFile(e.target.files[0])} className="w-full mb-3 p-2 bg-white border rounded" />
                                
                                <button type="submit" disabled={!sportTypeFile || sportTypeLoading} className="w-full bg-orange-600 text-white font-bold py-2 rounded hover:bg-orange-700 disabled:bg-gray-400 flex justify-center">
                                    {sportTypeLoading ? <div className="loader"></div> : 'رفع الأيقونة'}
                                </button>
                            </form>

                            <div className="flex justify-center border p-8 rounded-lg bg-gray-50">
                                {sportTypeIcon ? (
                                    <div className="text-center">
                                        <img src={`${baseUrl}${sportTypeIcon}`} alt="Sport Icon" className="w-32 h-32 object-contain mx-auto drop-shadow-md rounded-full border-4 border-white" onError={(e)=>{e.target.src='https://via.placeholder.com/150?text=Error'}} />
                                        <p className="mt-2 text-sm text-gray-600 font-mono" dir="ltr">{sportTypeIcon}</p>
                                    </div>
                                ) : (
                                    <p className="text-gray-500">لا توجد أيقونة. ابحث أو ارفع واحدة.</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
